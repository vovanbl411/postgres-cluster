---
helm_version: "3.19.0"
helm_bin_path: "/usr/local/bin/helm"

cilium_version: "1.15.0"
cilium_helm_repo: "https://helm.cilium.io/"
cilium_kubeconfig: "/etc/kubernetes/admin.conf"

cilium_values:
  kubeProxyReplacement: "true"
  k8sServiceHost: "{{ ansible_host }}"
  k8sServicePort: "6443"
  devices: "ens3"
  routingMode: "tunnel"
  tunnelProtocol: "vxlan"
  loadBalancer:
    algorithm: "maglev"
  ipam:
    mode: "cluster-pool"
    operator:
      clusterPoolIPv4PodCIDRList: ["10.244.0.0/16"]
  bpf:
    masquerade: true
  cgroup:
    autoMount:
      enabled: false
    hostRoot: /sys/fs/cgroup
  operator:
    replicas: 1
  # egressGateway:
  #   enabled: true