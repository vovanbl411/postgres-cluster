---
- name: Check if Helm is installed
  ansible.builtin.stat:
    path: "{{ helm_bin_path }}"
  register: helm_bin

- name: Download and unpack Helm
  ansible.builtin.unarchive:
    src: "https://get.helm.sh/helm-v{{ helm_version }}-linux-amd64.tar.gz"
    dest: "/tmp"
    remote_src: true
  when: not helm_bin.stat.exists

- name: Install Helm binary
  ansible.builtin.copy:
    src: /tmp/linux-amd64/helm
    dest: "{{ helm_bin_path }}"
    mode: '0755'
    remote_src: true
  when: not helm_bin.stat.exists

- name: Make Helm executable
  ansible.builtin.file:
    path: "{{ helm_bin_path }}"
    mode: '0755'

- name: Cleanup Helm temporary files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/helm-{{ helm_version }}.tar.gz"
    - "/tmp/linux-amd64"
  when: not helm_bin.stat.exists

- name: Add Cilium Helm repository
  kubernetes.core.helm_repository:
    name: cilium
    repo_url: "{{ cilium_helm_repo }}"
    force_update: true

- name: Verify kubeconfig exists
  ansible.builtin.stat:
    path: "{{ cilium_kubeconfig }}"
  register: kubeconfig_stat

- name: Fail if kubeconfig is missing
  ansible.builtin.fail:
    msg: "Kubernetes admin config not found at {{ cilium_kubeconfig }}. Ensure control plane is initialized."
  when: not kubeconfig_stat.stat.exists

- name: Deploy Cilium with kube-proxy replacement
  kubernetes.core.helm:
    name: cilium
    chart_ref: cilium/cilium
    chart_version: "{{ cilium_version }}"
    release_namespace: kube-system
    kubeconfig: "{{ cilium_kubeconfig }}"
    wait: true
    wait_timeout: 300s
    values: "{{ cilium_values }}"

- name: Verify Cilium is running
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: kube-system
    label_selectors:
      - k8s-app=cilium
    kubeconfig: "{{ cilium_kubeconfig }}"
  register: cilium_pods
  failed_when: cilium_pods.resources | length == 0
