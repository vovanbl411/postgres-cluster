---
- name: Create systemd unit for VPN route
  template:
    src: vpn-route.service.j2
    dest: "/etc/systemd/system/{{ route_service_name }}.service"
    mode: '0644'
  notify: reload systemd

- name: Enable and start VPN route service
  systemd:
    name: "{{ route_service_name }}"
    enabled: yes
    state: started
    daemon_reload: yes