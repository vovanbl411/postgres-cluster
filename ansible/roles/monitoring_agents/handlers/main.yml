---
- name: Restart node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: restarted
    daemon_reload: true

- name: Restart vmagent
  ansible.builtin.systemd:
    name: vmagent
    state: restarted
    daemon_reload: true

- name: Restart wireguard_exporter
  ansible.builtin.systemd:
    name: wireguard_exporter
    state: restarted
    daemon_reload: true