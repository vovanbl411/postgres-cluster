- name: Allow VictoriaMetrics port
  ansible.builtin.ufw:
    rule: allow
    port: "8428"
    proto: tcp
    from_ip: "10.0.0.0/24"

# ==================== Build wireguard_exporter artifact ====================

- name: Install build dependencies
  ansible.builtin.apt:
    name:
      - build-essential
      - curl
    state: present

- name: Install Rust toolchain
  ansible.builtin.shell: |
    set -e
    if ! [ -f /root/.cargo/bin/cargo ]; then
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    fi
    . /root/.cargo/env
    cargo --version
  register: rust_install
  changed_when: "'installed' in rust_install.stdout"

- name: Create build directory
  ansible.builtin.file:
    path: /opt/wireguard_exporter
    state: directory
    mode: '0755'

- name: Build prometheus_wireguard_exporter via cargo
  ansible.builtin.shell: |
    set -e
    . /root/.cargo/env
    cargo install prometheus_wireguard_exporter --version {{ wireguard_exporter_version }} --root /opt/wireguard_exporter
  args:
    creates: /opt/wireguard_exporter/bin/prometheus_wireguard_exporter
  register: cargo_build
  changed_when: "'Installing' in cargo_build.stdout or 'Compiling' in cargo_build.stdout"

- name: Fetch compiled binary to Ansible controller
  ansible.builtin.fetch:
    src: /opt/wireguard_exporter/bin/prometheus_wireguard_exporter
    dest: "/tmp/wireguard_exporter_{{ wireguard_exporter_version }}"
    flat: true

# ==================== Route for WireGuard tunnel ====================
# Чтобы облако (bastion 10.200.0.1) могло достучаться до monitoring-server

- name: Ensure route to WireGuard tunnel network exists
  ansible.builtin.command: |
    ip route add 10.200.0.0/24 via 10.0.0.10
  register: route_add
  changed_when: "'File exists' not in route_add.stderr"
  failed_when: 
    - route_add.rc != 0
    - "'File exists' not in route_add.stderr"

- name: Persist WireGuard route via systemd-networkd
  ansible.builtin.copy:
    content: |
      [Route]
      Destination=10.200.0.0/24
      Gateway=10.0.0.10
    dest: /etc/systemd/network/10-wg-tunnel.route
    mode: '0644'
  notify: Restart systemd-networkd

- name: Ensure systemd-networkd is running
  ansible.builtin.systemd:
    name: systemd-networkd
    state: started
    enabled: true

- name: Ensure route to cloud VPC via controller-0
  ansible.builtin.command: |
    ip route add 192.168.10.0/24 via 10.0.0.10
  register: vpc_route
  changed_when: "'File exists' not in vpc_route.stderr"
  failed_when:
    - vpc_route.rc != 0
    - "'File exists' not in vpc_route.stderr"

- name: Persist VPC route via systemd-networkd
  ansible.builtin.copy:
    content: |
      [Route]
      Destination=192.168.10.0/24
      Gateway=10.0.0.10
    dest: /etc/systemd/network/20-cloud-vpc.route
    mode: '0644'
  notify: Restart systemd-networkd