---
- name: Ensure monitoring group exists
  ansible.builtin.group:
    name: "{{ monitoring_group }}"
    system: true
    state: present

- name: Ensure monitoring user exists
  ansible.builtin.user:
    name: "{{ monitoring_user }}"
    group: "{{ monitoring_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ victoria_metrics_data_dir }}"
    state: present

# ==================== VictoriaMetrics ====================

- name: Create VictoriaMetrics directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_group }}"
    mode: '0750'
  loop:
    - "{{ victoria_metrics_data_dir }}"
    - "{{ victoria_metrics_bin_dir }}"

- name: Check if VictoriaMetrics binary exists
  ansible.builtin.stat:
    path: "{{ victoria_metrics_bin_dir }}/victoria-metrics-prod"
  register: vm_binary

- name: Check VictoriaMetrics version
  ansible.builtin.command: "{{ victoria_metrics_bin_dir }}/victoria-metrics-prod --version"
  register: vm_version_output
  changed_when: false
  ignore_errors: true
  when: vm_binary.stat.exists

- name: Download and install VictoriaMetrics
  ansible.builtin.get_url:
    url: "https://github.com/VictoriaMetrics/VictoriaMetrics/releases/download/v{{ victoria_metrics_version }}/victoria-metrics-linux-amd64-v{{ victoria_metrics_version }}.tar.gz"
    dest: "/tmp/victoria-metrics-{{ victoria_metrics_version }}.tar.gz"
    mode: '0644'
  when: >
    not vm_binary.stat.exists or
    (vm_version_output.stdout is not defined or
     victoria_metrics_version not in vm_version_output.stdout)

- name: Extract VictoriaMetrics binary
  ansible.builtin.unarchive:
    src: "/tmp/victoria-metrics-{{ victoria_metrics_version }}.tar.gz"
    dest: "/tmp/"
    remote_src: true
  when: >
    not vm_binary.stat.exists or
    (vm_version_output.stdout is not defined or
     victoria_metrics_version not in vm_version_output.stdout)

- name: Move VictoriaMetrics binary to bin dir
  ansible.builtin.copy:
    src: "/tmp/victoria-metrics-prod"
    dest: "{{ victoria_metrics_bin_dir }}/victoria-metrics-prod"
    mode: '0755'
    remote_src: true
  when: >
    not vm_binary.stat.exists or
    (vm_version_output.stdout is not defined or
     victoria_metrics_version not in vm_version_output.stdout)
  notify: Restart victoriametrics

- name: Create VictoriaMetrics systemd service
  ansible.builtin.template:
    src: victoriametrics.service.j2
    dest: /etc/systemd/system/victoria-metrics.service
    mode: '0644'
  notify:
    - Restart victoriametrics

- name: Ensure VictoriaMetrics is running
  ansible.builtin.systemd:
    name: victoria-metrics
    state: started
    enabled: true
    daemon_reload: true

