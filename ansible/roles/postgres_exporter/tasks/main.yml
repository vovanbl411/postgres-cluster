---
- name: Ensure postgres_exporter binary exists on Ansible controller
  ansible.builtin.stat:
    path: "/tmp/postgres_exporter-{{ postgres_exporter_version }}.linux-amd64/postgres_exporter"
  delegate_to: localhost
  become: false
  register: pgex_local_binary

- name: Download postgres_exporter on Ansible controller
  ansible.builtin.get_url:
    url: "https://github.com/prometheus-community/postgres_exporter/releases/download/v{{ postgres_exporter_version }}/postgres_exporter-{{ postgres_exporter_version }}.linux-amd64.tar.gz"
    dest: "/tmp/postgres_exporter-{{ postgres_exporter_version }}.tar.gz"
    mode: '0644'
  delegate_to: localhost
  become: false
  when: not pgex_local_binary.stat.exists

- name: Extract postgres_exporter on Ansible controller
  ansible.builtin.unarchive:
    src: "/tmp/postgres_exporter-{{ postgres_exporter_version }}.tar.gz"
    dest: "/tmp/"
    remote_src: true
  delegate_to: localhost
  become: false
  when: not pgex_local_binary.stat.exists

- name: Check installed postgres_exporter version
  ansible.builtin.stat:
    path: "/usr/local/bin/postgres_exporter"
  register: pgex_binary

- name: Check postgres_exporter version on target
  ansible.builtin.command: "/usr/local/bin/postgres_exporter --version"
  register: pgex_version_output
  changed_when: false
  ignore_errors: true
  when: pgex_binary.stat.exists

- name: Install postgres_exporter binary from controller
  ansible.builtin.copy:
    src: "/tmp/postgres_exporter-{{ postgres_exporter_version }}.linux-amd64/postgres_exporter"
    dest: "/usr/local/bin/postgres_exporter"
    mode: '0755'
  when: >
    not pgex_binary.stat.exists or
    (pgex_version_output.stdout is not defined or
     postgres_exporter_version not in pgex_version_output.stdout)
  notify: Restart postgres_exporter

- name: Create postgres_exporter environment file
  ansible.builtin.template:
    src: postgres_exporter.env.j2
    dest: /etc/default/postgres_exporter
    mode: '0644'
    owner: root
    group: root
  notify: Restart postgres_exporter

- name: Create postgres_exporter systemd service
  ansible.builtin.template:
    src: postgres_exporter.service.j2
    dest: /etc/systemd/system/postgres_exporter.service
    mode: '0644'
  notify: Restart postgres_exporter

- name: Start postgres_exporter
  ansible.builtin.systemd:
    name: postgres_exporter
    state: started
    enabled: true
    daemon_reload: true

- name: Ensure netplan monitoring routes config exists
  ansible.builtin.copy:
    content: |
      network:
        version: 2
        ethernets:
          eth1:
            routes:
              - to: 10.0.0.0/24
                via: 192.168.10.7
    dest: /etc/netplan/99-monitoring-routes.yaml
    mode: '0644'
  register: netplan_routes

- name: Apply netplan configuration
  ansible.builtin.command: netplan apply
  when: netplan_routes.changed