---
- name: Install PostgreSQL and Patroni
  apt:
    name:
      - postgresql-16
      - patroni
      - python3-psycopg2
      - python3-consul
    state: present

- name: Stop and disable default PostgreSQL service
  systemd:
    name: postgresql
    state: stopped
    enabled: no
  comment: "Patroni will manage PostgreSQL lifecycle"

- name: Create Patroni configuration directory
  file:
    path: /etc/patroni
    state: directory
    owner: postgres
    group: postgres
    mode: '0750'

- name: Generate Patroni configuration
  template:
    src: patroni.yml.j2
    dest: /etc/patroni/patroni.yml
    owner: postgres
    group: postgres
    mode: '0640'
  notify: restart patroni

- name: Ensure Patroni systemd unit is present
  template:
    src: patroni.service.j2
    dest: /etc/systemd/system/patroni.service
  notify: reload systemd

- name: Start and enable Patroni
  systemd:
    name: patroni
    state: started
    enabled: yes