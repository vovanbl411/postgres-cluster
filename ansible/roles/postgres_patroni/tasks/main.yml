---
- name: Install PostgreSQL and Patroni
  apt:
    name:
      - postgresql
      - patroni
      - python3-psycopg2
      - python3-consul
    state: present

- name: Stop and disable default PostgreSQL service
  systemd:
    name: postgresql
    state: stopped
    enabled: no

- name: Drop default PG cluster
  command: pg_dropcluster {{ postgres_version }} main --stop
  register: drop_result
  failed_when:
    - drop_result.rc != 0
    - "'does not exist' not in drop_result.stderr"
  changed_when: drop_result.rc == 0 

- name: Create Patroni configuration directory
  file:
    path: /etc/patroni
    state: directory
    owner: postgres
    group: postgres
    mode: '0750'

- name: Ensure PostgreSQL data directory exists and is clean
  file:
    path: "/var/lib/postgresql/{{ postgres_version }}/main"
    state: directory
    owner: postgres
    group: postgres
    mode: '0700'

- name: Generate Patroni configuration
  template:
    src: patroni.yml.j2
    dest: /etc/patroni/patroni.yml
    owner: postgres
    group: postgres
    mode: '0640'

- name: Ensure Patroni systemd unit is present
  template:
    src: patroni.service.j2
    dest: /etc/systemd/system/patroni.service

- name: Start and enable Patroni
  systemd:
    name: patroni
    state: started
    enabled: yes
  notify: restart patroni