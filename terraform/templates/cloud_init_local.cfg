#cloud-config
hostname: ${hostname}
fqdn: ${hostname}
manage_etc_hosts: true

users:
  - name: vladimir
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_key}

ssh_pwauth: false
packages_update: true
packages:
  - qemu-guest-agent
  - curl
  - nano
  - socat
  - conntrack

growpart:
  mode: auto
  devices:
    - /

runcmd:
  -systemctl enable --now qemu-guest-agent